<!DOCTYPE html>

    <title>Confirmado!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div class="card confirmation">
            <h1>💕 Tudo Confirmado! 💕</h1>

                Te busco no dia <strong id="dia-selected"></strong> no horário <strong id="hora-selected"></strong>
                <br>
                Local: <strong id="local-selected"></strong>
                <br><br>
                Até lá se cuida e fique bem, te amo!
                <br><br>
                Assinado: Amor da sua vida
            </p>
            <div class="heart-animation">❤️</div>
        </div>
        <p class="note">Enviar um print no Whatsapp para confirmação.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
