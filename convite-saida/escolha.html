<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha o Dia, Local e Horário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Escolha o nosso jantar</h1>

            <section>
                <h2>Que dia você prefere?</h2>
                <div class="options-group">
                    <label class="option">
                        <input type="radio" name="dia" value="19/06/26" required>
                        <span class="option-label">19/06/26 (Sexta-feira)</span>
                    </label>
                    <label class="option">
                        <input type="radio" name="dia" value="20/06/26" required>
                        <span class="option-label">20/06/26 (Sábado)</span>
                    </label>
                    <label class="option">
                        <input type="radio" name="dia" value="21/06/26" required>
                        <span class="option-label">21/06/26 (Domingo)</span>
                    </label>
                </div>
            </section>

            <section>
                <h2>Qual local você prefere?</h2>
                <div class="options-group">
                    <label class="option">
                        <input type="radio" name="local" value="Tomilho" required>
                        <span class="option-label">Tomilho</span>
                    </label>
                    <label class="option">
                        <input type="radio" name="local" value="Costela No Bafo" required>
                        <span class="option-label">Costela No Bafo</span>
                    </label>
                </div>
            </section>

            <section>
                <h2>Qual horário você prefere?</h2>
                <div class="options-group">
                    <label class="option">
                        <input type="radio" name="hora" value="19:00" required>
                        <span class="option-label">19:00</span>
                    </label>
                    <label class="option">
                        <input type="radio" name="hora" value="19:30" required>
                        <span class="option-label">19:30</span>
                    </label>
                    <label class="option">
                        <input type="radio" name="hora" value="20:00" required>
                        <span class="option-label">20:00</span>
                    </label>
                    <label class="option">
                        <input type="radio" name="hora" value="20:30" required>
                        <span class="option-label">20:30</span>
                    </label>
                </div>
            </section>

            <p class="note">⏰ Sem Atraso</p>
            <button class="btn btn-primary" onclick="confirmar()">Confirmar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
